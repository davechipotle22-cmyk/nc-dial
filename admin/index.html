<!DOCTYPE html>

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #151c2e; border: 1px solid #26304a; border-radius: 20px; padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .badge { display: inline-block; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; padding: 0.3rem 0.75rem; border-radius: 999px; margin-bottom: 1rem; }
    .brand { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
    h1 { color: #38bdf8; font-size: 1.6rem; font-weight: 700; margin-bottom: 0.25rem; }
    .subtitle { color: #64748b; font-size: 0.8rem; margin-bottom: 1.25rem; }
    .status { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.25rem; }
    .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.5); } 50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(16,185,129,0); } }
    .status-text { color: #10b981; font-size: 0.78rem; font-weight: 600; }
    .spinner { width: 36px; height: 36px; border: 3px solid #26304a; border-top-color: #38bdf8; border-radius: 50%; margin: 1rem auto 0.75rem; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #94a3b8; font-size: 0.85rem; margin-top: 0.5rem; }
    a { color: #38bdf8; text-decoration: none; word-break: break-all; }
    a:hover { text-decoration: underline; }
    .btn { display: inline-block; background: linear-gradient(135deg, #38bdf8, #0284c7); color: #fff; font-size: 0.9rem; font-weight: 600; padding: 0.75rem 2rem; border-radius: 10px; text-decoration: none; margin-top: 1rem; transition: transform 0.15s, box-shadow 0.15s; box-shadow: 0 4px 20px rgba(56,189,248,0.3); }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 25px rgba(56,189,248,0.45); text-decoration: none; }
    .divider { border: none; border-top: 1px solid #26304a; margin: 1.25rem 0; }
    .footer { font-size: 0.65rem; color: #475569; line-height: 1.6; }
    .footer strong { color: #64748b; }
    .clock { color: #94a3b8; font-size: 0.75rem; font-variant-numeric: tabular-nums; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Admin Access</div>
    <div class="brand">Noble Crest Management</div>
    <h1>Auto Dialer</h1>
    <p class="subtitle">24 / 7 / 365 &mdash; Always On</p>
    <div class="status">
      <span class="dot"></span>
      <span class="status-text">System Online</span>
    </div>
    <div class="spinner"></div>
    <p>Connecting to dialer&hellip;</p>
    <a id="fallback" class="btn" href="https://friend-itunes-julia-months.trycloudflare.com">Launch Dialer Now</a>
    <hr class="divider">
    <div class="footer">
      <strong>Stable admin link</strong> &middot; auto-updated on tunnel rotation<br>
      Bookmark this page for instant access
    </div>
    <div id="clock" class="clock"></div>
  </div>
  <script>
    (function(){
      var target = "https://friend-itunes-julia-months.trycloudflare.com";
      var suffix = window.location.pathname.replace(/^\/nc-dial\/admin\/?/, '/') || '/';
      if (suffix === '/index.html') suffix = '/';
      var q = window.location.search || '';
      var h = window.location.hash || '';
      var url = target.replace(/\/$/, '') + suffix + q + h;
      document.getElementById('fallback').href = url;

      // Live clock
      function tick() {
        var now = new Date();
        document.getElementById('clock').textContent = now.toLocaleString('en-US', {
          weekday: 'short', month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true
        });
      }
      tick();
      setInterval(tick, 1000);

      // Auto-redirect after brief splash
      setTimeout(function(){ window.location.replace(url); }, 2000);
    })();
  </script>
</body>
</html>
