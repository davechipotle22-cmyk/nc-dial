<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Noble Crest">
  <title>Noble Crest Dialer</title>
  <meta http-equiv="refresh" content="0; url=https://noblecrest.org/">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0e1a; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: #151c2e; border: 1px solid #26304a; border-radius: 16px; padding: 2.5rem 2rem; max-width: 380px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .brand { color: #94a3b8; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
    h1 { color: #38bdf8; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid #26304a; border-top-color: #38bdf8; border-radius: 50%; margin: 1.25rem auto 0.75rem; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #94a3b8; font-size: 0.85rem; margin-top: 0.5rem; }
    a { color: #38bdf8; text-decoration: none; word-break: break-all; }
    a:hover { text-decoration: underline; }
    .footer { margin-top: 1.25rem; font-size: 0.7rem; color: #64748b; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Noble Crest Management</div>
    <h1>Dialer</h1>
    <div class="spinner"></div>
    <p>Signing you in&hellip;</p>
    <p style="margin-top:0.75rem;font-size:0.7rem;">If nothing happens, <a id="fallback" href="https://noblecrest.org">click here</a>.</p>
    <div class="footer">Stable link &middot; auto-updated daily</div>
  </div>
  <script>
    // Always redirect to the current tunnel URL, preserving any query/path
    // the worker came in with (e.g. /i/<invite-token>).
    (function(){
      var target = "https://noblecrest.org";
      var suffix = window.location.pathname.replace(/^\/nc-dial\/?/, '/') || '/';
      if (suffix === '/index.html') suffix = '/';
      var q = window.location.search || '';
      var h = window.location.hash || '';
      var url = target.replace(/\/$/, '') + suffix + q + h;
      document.getElementById('fallback').href = url;
      // Use replace() so back button doesn't trap the worker here
      window.location.replace(url);
    })();
  </script>
</body>
</html>
